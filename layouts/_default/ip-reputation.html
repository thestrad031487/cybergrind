{{ define "main" }}
<div class="ip-checker">
  <h1>IP Reputation Check</h1>
  <p>Check the abuse confidence score and reputation of any IP address via AbuseIPDB.</p>

  <div class="search-box">
    <input
      type="text"
      id="ip-input"
      placeholder="1.1.1.1"
      maxlength="45"
    />
    <button id="lookup-btn">Check IP</button>
  </div>

  <div id="result" class="result hidden"></div>
</div>

<style>
  .ip-checker { max-width: 600px; margin: 2rem auto; }
  .search-box { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
  .search-box input {
    flex: 1; padding: 0.6rem 1rem;
    border: 1px solid #444; border-radius: 6px;
    background: #1a1a1a; color: #fff; font-size: 1rem;
  }
  .search-box button {
    padding: 0.6rem 1.2rem; background: #0070f3;
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; font-size: 1rem;
  }
  .result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: #111; }
  .result.hidden { display: none; }
  .result-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  .result-table td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #222; }
  .result-table td:first-child { color: #888; width: 40%; }
  .risk-CRITICAL { color: #ff4444; }
  .risk-HIGH { color: #ff8800; }
  .risk-MEDIUM { color: #ffcc00; }
  .risk-LOW { color: #44cc44; }
</style>

<script src="/js/ip-reputation.js"></script>
{{ end }}

{{ define "main" }}
<div class="epss-scanner">
  <h1>EPSS Score Lookup</h1>
  <p>Check the Exploit Prediction Scoring System (EPSS) score for any CVE.</p>

  <div class="search-box">
    <input
      type="text"
      id="cve-input"
      placeholder="CVE-2024-1234"
      maxlength="20"
    />
    <button id="lookup-btn">Lookup</button>
  </div>

  <div id="result" class="result hidden"></div>
</div>

<style>
  .epss-scanner { max-width: 600px; margin: 2rem auto; }
  .search-box { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
  .search-box input {
    flex: 1; padding: 0.6rem 1rem;
    border: 1px solid #444; border-radius: 6px;
    background: #1a1a1a; color: #fff; font-size: 1rem;
  }
  .search-box button {
    padding: 0.6rem 1.2rem; background: #0070f3;
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; font-size: 1rem;
  }
  .result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: #111; }
  .result.hidden { display: none; }
  .risk-CRITICAL { color: #ff4444; }
  .risk-HIGH { color: #ff8800; }
  .risk-MEDIUM { color: #ffcc00; }
  .risk-LOW { color: #44cc44; }
</style>

<script src="/js/epss.js"></script>
{{ end }}

{{ define "main" }}
<div class="cisa-kev">
  <h1>CISA KEV Checker</h1>
  <p>Check if a CVE is listed in CISA's Known Exploited Vulnerabilities catalog — the authoritative source for vulnerabilities actively exploited in the wild.</p>

  <div class="search-box">
    <input
      type="text"
      id="cve-input"
      placeholder="CVE-2024-1234"
      maxlength="20"
    />
    <button id="lookup-btn">Check KEV</button>
  </div>

  <div id="result" class="result hidden"></div>
</div>

<style>
  .cisa-kev { max-width: 700px; margin: 2rem auto; }
  .search-box { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
  .search-box input {
    flex: 1; padding: 0.6rem 1rem;
    border: 1px solid #444; border-radius: 6px;
    background: #1a1a1a; color: #fff; font-size: 1rem;
  }
  .search-box button {
    padding: 0.6rem 1.2rem; background: #0070f3;
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; font-size: 1rem;
  }
  .result { margin-top: 1.5rem; padding: 1.5rem; border-radius: 8px; background: #111; }
  .result.hidden { display: none; }
  .status-badge {
    display: inline-block; padding: 0.4rem 1rem;
    border-radius: 4px; font-weight: bold;
    margin-bottom: 1rem; font-size: 0.9rem;
  }
  .in-kev { background: #3a1a1a; color: #ff4444; border: 1px solid #ff4444; }
  .not-in-kev { background: #1a3a1a; color: #44cc44; border: 1px solid #44cc44; }
  .found h3 { margin: 0.5rem 0 0.25rem 0; font-size: 1.3rem; }
  .vuln-name { color: #aaa; margin: 0 0 1.5rem 0; }
  .result-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
  .result-table td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #222; }
  .result-table td:first-child { color: #888; width: 40%; }
  .due-date { color: #ff8800; }
  .ransomware-known { color: #ff4444; font-weight: bold; }
  .ransomware-unknown { color: #888; }
  .description h4 { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .description p { color: #ccc; line-height: 1.6; }
  .note { color: #888; font-size: 0.875rem; font-style: italic; }
  .kev-link { display: inline-block; margin-top: 1rem; color: #0070f3; text-decoration: none; }
  .kev-link:hover { text-decoration: underline; }
</style>

<script src="/js/cisa-kev.js"></script>
{{ end }}

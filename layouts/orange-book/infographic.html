{{ define "main" }}
<style>
  .infographic-wrap { max-width: 960px; margin: 0 auto; padding: 20px 0; }
  .back-link { font-size: 13px; color: var(--primary); margin-bottom: 16px; display: inline-block; }
  .infographic-frame {
    width: 100%;
    border: none;
    min-height: 100vh;
    display: block;
  }
</style>

<div class="infographic-wrap">
  {{ with .Params.back_link }}
  <a class="back-link" href="{{ . }}">{{ $.Params.back_label | default "← Back to article" }}</a>
  {{ end }}

  {{ $infographic := .Params.infographic | default "infographic.html" }}
  {{ with .Resources.GetMatch $infographic }}
  <iframe
    src="{{ .RelPermalink }}"
    class="infographic-frame"
    id="infographic-frame"
    scrolling="no"
    title="{{ $.Title }}"
  ></iframe>
  {{ else }}
  <p style="color:#999;">Infographic file not found.</p>
  {{ end }}
</div>

<script>
  // Auto-resize iframe to fit content height
  const frame = document.getElementById('infographic-frame');
  frame.addEventListener('load', function() {
    try {
      frame.style.height = frame.contentDocument.body.scrollHeight + 'px';
    } catch(e) {}
  });
</script>
{{ end }}

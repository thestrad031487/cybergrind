baseURL = "https://cybergrind.org/"
languageCode = "en-us"
title = "CyberGrind"
theme = "PaperMod"
paginate = 10
mainSections = ["blog"]

[params]
  author = "Jason, Cyber Professional"
  description = "Surviving the daily grind of cybersecurity."
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "dark"
  
  [params.profileMode]
    enabled = false

  [params.homeInfoParams]
    Title = "CyberGrind"
    Content = """
For the people actually doing the work. Daily news, blue team tools,
and straight talk from the cybersecurity trenches.
<br><a href="/index.xml" title="Subscribe via RSS" style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;color:var(--primary);text-decoration:none;font-size:14px;"><svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='currentColor'><path d='M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z'/></svg>Subscribe via RSS</a>
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/thestrad031487"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/jasonrwacker"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "News"
    url = "/blog/"
    weight = 1
  [[menu.main]]
    name = "Orange Book"
    url = "/orange-book/"
    weight = 2
  [[menu.main]]
    name = "Tools"
    url = "/tools/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4
  [[menu.main]]
    name = ""
    pre = "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='currentColor' style='vertical-align:middle;'><path d='M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z'/></svg>"
    url = "/index.xml"

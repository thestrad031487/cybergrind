baseURL = "https://cybergrind.org/"
languageCode = "en-us"
title = "CyberGrind"
theme = "PaperMod"
paginate = 5
summarylength = 30
mainSections = ["blog"]
copyright = "2026 CyberGrind"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "Jason, Cyber Professional"
  description = "Practitioner-grade threat intelligence, interactive security tools, and a sourced cybersecurity education library — free, no fluff."
  keywords = ["cybersecurity", "threat intelligence", "blue team", "NIST", "CISA", "security tools", "infosec", "SOC"]
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "dark"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 3
  limit = 20
  keys = ["title", "permalink", "summary", "content"]

[params.assets]
  favicon = "/favicon.svg"
  og_image = "/images/og-default.png"

[params.schema]
  publisherType = "Organization"
  sameAs = [
    "\"https://github.com/thestrad031487\"",
    "\"https://linkedin.com/in/jasonrwacker\""
  ]

[params.label]
  icon = "/images/cybergrind-logo.svg"
  iconHeight = 55
  iconWidth = 300
  text = " "

[params.footer]
  text = "[GitHub](https://github.com/thestrad031487) · [Data Sources](/data-sources/) · Informational only — not legal or security advice"

[params.profileMode]
  enabled = false

[params.homeInfoParams]
  Title = "CyberGrind"
  Content = """
Daily threat intel, interactive tools, and an expanding library of security education — all free, all sourced, no fluff.
<br><a href="/index.xml" title="Subscribe via RSS" style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;color:var(--primary);text-decoration:none;font-size:14px;"><svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='currentColor'><path d='M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z'/></svg>Subscribe via RSS</a>
"""


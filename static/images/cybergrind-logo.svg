<svg xmlns="http://www.w3.org/2000/svg" width="340" height="100" viewBox="0 0 340 100">
  <!-- window shell -->
  <rect x="0" y="0" width="340" height="100" rx="8" fill="#111315"/>
  <rect x="0" y="0" width="340" height="100" rx="8" fill="none" stroke="#2a2d30" stroke-width="1"/>
  <!-- title bar -->
  <rect x="0" y="0" width="340" height="26" rx="8" fill="#0e1012"/>
  <rect x="0" y="18" width="340" height="8" fill="#0e1012"/>
  <!-- traffic lights -->
  <circle cx="18" cy="13" r="5" fill="#FF8C00" opacity="0.45"/>
  <circle cx="33" cy="13" r="5" fill="#FFAD33" opacity="0.45"/>
  <circle cx="48" cy="13" r="5" fill="#FF8C00" opacity="0.85"/>
  <!-- window title -->
  <text x="170" y="18" font-family="'Courier New',monospace" font-size="10" fill="#3a3d40" text-anchor="middle" letter-spacing="0.05em">cybergrind — bash</text>
  <!-- prompt + wordmark -->
  <text x="18" y="66" font-family="'Courier New',monospace" font-weight="700" font-size="22" fill="#8E9297">
    <tspan fill="#8E9297">$ cyber</tspan><tspan fill="#FF8C00">grind</tspan>
  </text>
  <!-- cursor block -->
  <rect x="210" y="47" width="13" height="22" rx="1" fill="#FFAD33" opacity="0.95"/>
  <!-- tagline -->
  <text x="18" y="88" font-family="'Courier New',monospace" font-size="10" fill="#3a3d40" letter-spacing="0.08em">threat intel · blue team tools · education</text>
</svg>

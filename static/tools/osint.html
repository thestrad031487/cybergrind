<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain OSINT | CyberGrind Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --orange: #f97316;
      --orange-dim: rgba(249,115,22,0.15);
      --orange-glow: rgba(249,115,22,0.08);
      --text: #e8e8e8;
      --text-dim: #888;
      --text-muted: #555;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --mono: 'Space Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .site-header a {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--orange);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .site-header span { color: var(--text-muted); }

    /* ── Hero ── */
    .hero {
      padding: 48px 32px 32px;
      max-width: 900px;
      margin: 0 auto;
    }
    .hero-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--orange);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-family: var(--mono);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--orange); }
    .hero p {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.7;
      max-width: 580px;
    }

    /* ── Search bar ── */
    .search-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px 32px;
    }
    .search-box {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--orange); }
    .search-prefix {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--orange);
      padding: 14px 16px;
      background: var(--orange-glow);
      border-right: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    #target-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      caret-color: var(--orange);
    }
    #target-input::placeholder { color: var(--text-muted); }
    #scan-btn {
      background: var(--orange);
      color: #000;
      border: none;
      padding: 14px 28px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }
    #scan-btn:hover { background: #fb923c; }
    #scan-btn:active { transform: scale(0.98); }
    #scan-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    /* Module toggles */
    .module-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .toggle-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      user-select: none;
    }
    .toggle-btn.active {
      border-color: var(--orange);
      color: var(--orange);
      background: var(--orange-dim);
    }

    /* ── Progress ── */
    .progress-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px 24px;
      display: none;
    }
    .progress-wrap.visible { display: block; }
    .progress-bar-bg {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--orange);
      border-radius: 1px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-tasks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .task-pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .task-pill.running { border-color: var(--orange); color: var(--orange); }
    .task-pill.done { border-color: var(--green); color: var(--green); }
    .task-pill.error { border-color: var(--red); color: var(--red); }

    /* ── Results ── */
    .results-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: var(--surface2); }
    .card-title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .card-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    .card-chevron {
      color: var(--text-muted);
      font-size: 12px;
      transition: transform 0.2s;
    }
    .card-header.collapsed .card-chevron { transform: rotate(-90deg); }
    .card-body {
      padding: 20px;
      overflow: hidden;
    }
    .card-body.collapsed { display: none; }

    /* ── Data display helpers ── */
    .kv-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 2px 0;
    }
    .kv-key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      padding: 6px 0;
      letter-spacing: 0.05em;
    }
    .kv-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      padding: 6px 0 6px 12px;
      word-break: break-all;
    }
    .kv-val.orange { color: var(--orange); }
    .kv-val.green  { color: var(--green); }
    .kv-val.red    { color: var(--red); }
    .kv-val.yellow { color: var(--yellow); }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      background: var(--surface2);
    }
    .tag.orange { border-color: var(--orange); color: var(--orange); }
    .tag.green  { border-color: var(--green); color: var(--green); }
    .tag.red    { border-color: var(--red); color: var(--red); }
    .tag.yellow { border-color: var(--yellow); color: var(--yellow); }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 16px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .section-label:first-child { margin-top: 0; }

    .dns-type-block { margin-bottom: 16px; }
    .dns-type-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--orange);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .dns-record {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      padding: 5px 10px;
      background: var(--surface2);
      border-left: 2px solid var(--border);
      margin-bottom: 3px;
      word-break: break-all;
    }
    .dns-record .ttl {
      color: var(--text-muted);
      font-size: 10px;
      margin-left: 8px;
    }

    .subdomain-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 4px;
    }
    .subdomain-item {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      padding: 5px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      word-break: break-all;
    }

    .header-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 4px 0;
      margin-bottom: 2px;
    }
    .header-key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      padding: 5px 8px 5px 0;
      word-break: break-word;
    }
    .header-val {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      padding: 5px 0 5px 10px;
      word-break: break-all;
      border-left: 1px solid var(--border);
    }

    .sec-header-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      margin-top: 4px;
    }
    .sec-header-item {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface2);
    }
    .sec-header-item.present { border-color: var(--green); }
    .sec-header-item.missing { border-color: var(--red); opacity: 0.6; }
    .sec-header-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .sec-header-item.present .sec-header-label { color: var(--green); }
    .sec-header-item.missing .sec-header-label { color: var(--red); }
    .sec-header-status {
      font-size: 10px;
      color: var(--text-muted);
    }

    .abuse-score {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .abuse-score.low    { color: var(--green); }
    .abuse-score.medium { color: var(--yellow); }
    .abuse-score.high   { color: var(--red); }
    .abuse-score-label  { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

    .port-pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--orange);
      border-radius: 2px;
      color: var(--orange);
      background: var(--orange-dim);
      margin: 3px;
    }

    .cert-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .cert-row:last-child { border-bottom: none; }
    .cert-cn {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .cert-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
      padding: 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/">CYBERGRIND</a>
    <span>/</span>
    <a href="/tools/">TOOLS</a>
    <span>/</span>
    <a href="/tools/osint/">DOMAIN OSINT</a>
  </header>

  <div class="hero">
    <div class="hero-label">// recon tool</div>
    <h1>Domain <span>OSINT</span> Scanner</h1>
    <p>Passive reconnaissance against any domain or IP — WHOIS, DNS, SSL certificates, subdomains, IP reputation, HTTP headers, and open port exposure. No active scanning. All queries use public APIs.</p>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <div class="search-prefix">TARGET://</div>
      <input id="target-input" type="text" placeholder="example.com or 1.2.3.4" autocomplete="off" spellcheck="false" />
      <button id="scan-btn">SCAN</button>
    </div>
    <div class="module-toggles" id="module-toggles">
      <button class="toggle-btn active" data-module="whois">WHOIS</button>
      <button class="toggle-btn active" data-module="dns">DNS</button>
      <button class="toggle-btn active" data-module="ssl">SSL/TLS</button>
      <button class="toggle-btn active" data-module="subdomains">SUBDOMAINS</button>
      <button class="toggle-btn active" data-module="iprep">IP REPUTATION</button>
      <button class="toggle-btn active" data-module="headers">HTTP HEADERS</button>
      <button class="toggle-btn active" data-module="ports">OPEN PORTS</button>
    </div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <div class="progress-tasks" id="progress-tasks"></div>
  </div>

  <div class="results-wrap" id="results-wrap"></div>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const WORKER_URL = "https://osint-worker.wacker-jason.workers.dev";
    // ── State ─────────────────────────────────────────────────────────────────
    const activeModules = new Set(["whois","dns","ssl","subdomains","iprep","headers","ports"]);
    let scanning = false;

    // ── Module toggle ─────────────────────────────────────────────────────────
    document.querySelectorAll(".toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const m = btn.dataset.module;
        if (activeModules.has(m)) { activeModules.delete(m); btn.classList.remove("active"); }
        else { activeModules.add(m); btn.classList.add("active"); }
      });
    });

    // ── Scan trigger ──────────────────────────────────────────────────────────
    document.getElementById("scan-btn").addEventListener("click", startScan);
    document.getElementById("target-input").addEventListener("keydown", e => {
      if (e.key === "Enter") startScan();
    });

    async function startScan() {
      if (scanning) return;
      const target = document.getElementById("target-input").value.trim()
        .toLowerCase().replace(/^https?:\/\//, "").replace(/\/.*$/, "");
      if (!target) return;

      scanning = true;
      document.getElementById("scan-btn").disabled = true;
      document.getElementById("results-wrap").innerHTML = "";

      const modules = [...activeModules];
      setupProgress(modules);

      let completed = 0;
      const promises = modules.map(async (mod) => {
        setPillState(mod, "running");
        try {
          const res = await fetch(`${WORKER_URL}?action=${mod}&target=${encodeURIComponent(target)}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          renderCard(mod, target, data);
          setPillState(mod, "done");
        } catch (err) {
          renderError(mod, err.message);
          setPillState(mod, "error");
        }
        completed++;
        document.getElementById("progress-bar").style.width = `${(completed / modules.length) * 100}%`;
      });

      await Promise.all(promises);
      scanning = false;
      document.getElementById("scan-btn").disabled = false;
    }

    // ── Progress ──────────────────────────────────────────────────────────────
    function setupProgress(modules) {
      const wrap = document.getElementById("progress-wrap");
      const tasks = document.getElementById("progress-tasks");
      document.getElementById("progress-bar").style.width = "0%";
      tasks.innerHTML = modules.map(m =>
        `<div class="task-pill" id="pill-${m}">${m.toUpperCase()}</div>`
      ).join("");
      wrap.classList.add("visible");
    }

    function setPillState(mod, state) {
      const pill = document.getElementById(`pill-${mod}`);
      if (pill) { pill.className = `task-pill ${state}`; }
    }

    // ── Card helpers ──────────────────────────────────────────────────────────
    function renderCard(mod, target, data) {
      const wrap = document.getElementById("results-wrap");
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(this)">
          <div class="card-title">${modLabel(mod)}</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="card-meta">${target}</div>
            <div class="card-chevron">▼</div>
          </div>
        </div>
        <div class="card-body" id="body-${mod}">
          ${renderBody(mod, data)}
        </div>`;
      wrap.appendChild(card);
    }

    function renderError(mod, msg) {
      const wrap = document.getElementById("results-wrap");
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(this)">
          <div class="card-title">${modLabel(mod)}</div>
          <div class="card-chevron">▼</div>
        </div>
        <div class="card-body" id="body-${mod}">
          <div class="error-msg">Error: ${escHtml(msg)}</div>
        </div>`;
      wrap.appendChild(card);
    }

    function toggleCard(header) {
      header.classList.toggle("collapsed");
      header.nextElementSibling.classList.toggle("collapsed");
    }

    function modLabel(mod) {
      return { whois:"WHOIS", dns:"DNS Records", ssl:"SSL / TLS Certs",
               subdomains:"Subdomains", iprep:"IP Reputation",
               headers:"HTTP Headers", ports:"Open Ports" }[mod] || mod;
    }

    // ── Body renderers ────────────────────────────────────────────────────────
    function renderBody(mod, d) {
      switch (mod) {
        case "whois":      return renderWhois(d);
        case "dns":        return renderDns(d);
        case "ssl":        return renderSsl(d);
        case "subdomains": return renderSubdomains(d);
        case "iprep":      return renderIpRep(d);
        case "headers":    return renderHeaders(d);
        case "ports":      return renderPorts(d);
        default:           return `<pre>${escHtml(JSON.stringify(d,null,2))}</pre>`;
      }
    }

    function renderWhois(d) {
      const rows = [
        ["Domain",      d.domain],
        ["Registered",  d.registered],
        ["Updated",     d.updated],
        ["Expires",     d.expires],
        ["Status",      (d.status||[]).join(", ") || "N/A"],
        ["Nameservers", (d.nameservers||[]).join(", ") || "N/A"],
      ];
      let html = `<div class="kv-grid">` + rows.map(([k,v]) =>
        `<div class="kv-key">${k}</div><div class="kv-val">${escHtml(v||"N/A")}</div>`
      ).join("") + `</div>`;

      if (d.entities?.length) {
        html += `<div class="section-label">Entities</div>`;
        d.entities.forEach(e => {
          html += `<div class="kv-grid" style="margin-bottom:10px">
            <div class="kv-key">Role</div><div class="kv-val orange">${escHtml(e.role)}</div>
            <div class="kv-key">Name</div><div class="kv-val">${escHtml(e.name)}</div>
            <div class="kv-key">Org</div><div class="kv-val">${escHtml(e.org)}</div>
            <div class="kv-key">Email</div><div class="kv-val">${escHtml(e.email)}</div>
          </div>`;
        });
      }
      return html;
    }

    function renderDns(d) {
      const types = ["A","AAAA","MX","NS","TXT","CNAME","SOA"];
      let html = "";
      types.forEach(t => {
        const records = d[t];
        if (!records?.length) return;
        html += `<div class="dns-type-block">
          <div class="dns-type-label">${t} Records (${records.length})</div>
          ${records.map(r => `<div class="dns-record">${escHtml(r.data)}<span class="ttl">TTL ${r.ttl}</span></div>`).join("")}
        </div>`;
      });
      return html || `<div class="empty-state">No DNS records found</div>`;
    }

    function renderSsl(d) {
      if (!d.certs?.length) return `<div class="empty-state">No certificates found</div>`;
      let html = `<div class="kv-grid" style="margin-bottom:16px">
        <div class="kv-key">Domain</div><div class="kv-val">${escHtml(d.domain)}</div>
        <div class="kv-key">Total logged</div><div class="kv-val orange">${d.count}</div>
      </div>`;
      d.certs.forEach(c => {
        html += `<div class="cert-row">
          <div class="cert-cn">${escHtml(c.common_name)}</div>
          <div class="cert-meta">
            <span>Issuer: ${escHtml(c.issuer?.split("O=")[1]?.split(",")[0] || c.issuer || "N/A")}</span>
            <span>From: ${fmtDate(c.not_before)}</span>
            <span>To: ${fmtDate(c.not_after)}</span>
          </div>
        </div>`;
      });
      return html;
    }

    function renderSubdomains(d) {
      if (!d.subdomains?.length) return `<div class="empty-state">No subdomains found</div>`;
      let html = `<div class="kv-grid" style="margin-bottom:16px">
        <div class="kv-key">Domain</div><div class="kv-val">${escHtml(d.domain)}</div>
        <div class="kv-key">Found</div><div class="kv-val orange">${d.count}</div>
      </div><div class="subdomain-list">`;
      d.subdomains.forEach(s => {
        html += `<div class="subdomain-item">${escHtml(s)}</div>`;
      });
      return html + `</div>`;
    }

    function renderIpRep(d) {
      const score = d.abuse_confidence;
      const scoreClass = score >= 75 ? "high" : score >= 25 ? "medium" : "low";
      const scoreLabel = score >= 75 ? "HIGH RISK" : score >= 25 ? "MODERATE RISK" : "LOW RISK";

      return `
        <div style="display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px">
          <div>
            <div class="abuse-score ${scoreClass}">${score}</div>
            <div class="abuse-score-label">ABUSE CONFIDENCE — ${scoreLabel}</div>
          </div>
          <div class="kv-grid" style="flex:1;min-width:240px">
            <div class="kv-key">IP</div><div class="kv-val orange">${escHtml(d.ip)}</div>
            ${d.resolved_from ? `<div class="kv-key">Resolved from</div><div class="kv-val">${escHtml(d.resolved_from)}</div>` : ""}
            <div class="kv-key">Total Reports</div><div class="kv-val">${d.total_reports}</div>
            <div class="kv-key">Distinct Users</div><div class="kv-val">${d.distinct_users}</div>
            <div class="kv-key">Country</div><div class="kv-val">${escHtml(d.country||"N/A")}</div>
            <div class="kv-key">ISP</div><div class="kv-val">${escHtml(d.isp||"N/A")}</div>
            <div class="kv-key">Usage Type</div><div class="kv-val">${escHtml(d.usage_type||"N/A")}</div>
            <div class="kv-key">Last Reported</div><div class="kv-val">${fmtDate(d.last_reported)}</div>
          </div>
        </div>
        <div class="tag-list">
          ${d.is_tor ? `<span class="tag red">TOR EXIT NODE</span>` : ""}
          ${d.is_whitelisted ? `<span class="tag green">WHITELISTED</span>` : ""}
          ${score === 0 ? `<span class="tag green">CLEAN</span>` : ""}
        </div>`;
    }

    function renderHeaders(d) {
      const secHeaders = d.security_analysis || {};
      const allHeaders = d.headers || {};

      let html = `<div class="kv-grid" style="margin-bottom:16px">
        <div class="kv-key">URL</div><div class="kv-val orange">${escHtml(d.url)}</div>
        <div class="kv-key">Status</div><div class="kv-val">${d.status}</div>
      </div>
      <div class="section-label">Security Headers</div>
      <div class="sec-header-grid">`;

      Object.entries(secHeaders).forEach(([key, info]) => {
        html += `<div class="sec-header-item ${info.present ? "present" : "missing"}">
          <div class="sec-header-label">${escHtml(info.label)}</div>
          <div class="sec-header-status">${info.present ? "✓ Present" : "✗ Missing"}</div>
        </div>`;
      });

      html += `</div><div class="section-label" style="margin-top:20px">All Headers</div>`;
      Object.entries(allHeaders).forEach(([k, v]) => {
        html += `<div class="header-row">
          <div class="header-key">${escHtml(k)}</div>
          <div class="header-val">${escHtml(v)}</div>
        </div>`;
      });
      return html;
    }

    function renderPorts(d) {
      let html = `<div class="kv-grid" style="margin-bottom:16px">
        <div class="kv-key">IP</div><div class="kv-val orange">${escHtml(d.ip)}</div>
        ${d.resolved_from ? `<div class="kv-key">Resolved from</div><div class="kv-val">${escHtml(d.resolved_from)}</div>` : ""}
      </div>`;

      if (d.open_ports?.length) {
        html += `<div class="section-label">Open Ports (${d.open_ports.length})</div>
          <div style="margin-bottom:16px">${d.open_ports.map(p => `<span class="port-pill">${p}</span>`).join("")}</div>`;
      } else {
        html += `<div class="empty-state" style="padding:16px 0">No open ports found in Shodan InternetDB</div>`;
      }

      if (d.vulns?.length) {
        html += `<div class="section-label">Known Vulnerabilities</div><div class="tag-list">`;
        d.vulns.forEach(v => { html += `<span class="tag red">${escHtml(v)}</span>`; });
        html += `</div>`;
      }

      if (d.hostnames?.length) {
        html += `<div class="section-label">Hostnames</div><div class="tag-list">`;
        d.hostnames.forEach(h => { html += `<span class="tag">${escHtml(h)}</span>`; });
        html += `</div>`;
      }

      if (d.tags?.length) {
        html += `<div class="section-label">Tags</div><div class="tag-list">`;
        d.tags.forEach(t => { html += `<span class="tag orange">${escHtml(t)}</span>`; });
        html += `</div>`;
      }

      return html;
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function escHtml(str) {
      if (str == null) return "N/A";
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function fmtDate(str) {
      if (!str) return "N/A";
      try { return new Date(str).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" }); }
      catch { return str; }
    }
  </script>
</body>
</html>
